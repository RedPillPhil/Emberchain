name: Build EmberChain Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  # ── Build on each platform ────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            builder_flag: --win
            artifact_glob: "dist/*Setup*.exe"
          - os: macos-latest
            label: macOS
            builder_flag: --mac
            artifact_glob: "dist/**/*.dmg"
          - os: ubuntu-latest
            label: Linux
            builder_flag: --linux
            artifact_glob: "dist/**/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Workspace install gives bundle-node-engine.mjs access to esbuild
      - name: Install workspace packages
        run: pnpm install --frozen-lockfile

      # Electron app has its own node_modules (electron-builder, ethers, etc.)
      - name: Install Electron app dependencies
        working-directory: lib/emberchain-wallet-electron
        run: npm install

      # Bundle the embedded chain node into node-engine-bundle.cjs
      - name: Bundle embedded node engine
        working-directory: lib/emberchain-wallet-electron
        run: node scripts/bundle-node-engine.mjs

      # Validate renderer files exist before building
      - name: Validate renderer files
        working-directory: lib/emberchain-wallet-electron
        run: node scripts/build.mjs

      # macOS: skip code-signing for unsigned builds
      - name: Build installer
        working-directory: lib/emberchain-wallet-electron
        run: npx electron-builder ${{ matrix.builder_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: lib/emberchain-wallet-electron/dist/
          if-no-files-found: error

  # ── Attach all installers to a GitHub Release ─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=desktop-v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "EmberChain Desktop ${{ steps.tag.outputs.name }}"
          draft: false
          prerelease: false
          files: |
            release-files/**/*Setup*.exe
            release-files/**/*.dmg
            release-files/**/*.AppImage
          body: |
            ## EmberChain Desktop ${{ steps.tag.outputs.name }}

            Full-node desktop wallet — node starts automatically on launch. No separate downloads needed.

            | Platform | Download | Notes |
            |----------|----------|-------|
            | 🪟 Windows | `*-Setup.exe` | Run installer, launch from Start Menu |
            | 🍎 macOS Intel | `*-x64.dmg` | Open DMG → drag to Applications |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Open DMG → drag to Applications |
            | 🐧 Linux | `*.AppImage` | `chmod +x *.AppImage` then run |

            ### What's included
            - **Wallet** — create/import wallets, send & receive EMBR
            - **Node** — full embedded chain node starts automatically
            - **Miner** — one-click mining from the app
            - **Private transactions** — shielded sends via the privacy pool

            > **Android?** Get the [EmberChain Android Wallet](../../releases/tag/android-v1.0.0).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
