name: Build EmberChain Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.platform }})
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lib/emberchain-desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install workspace packages
        run: pnpm install --frozen-lockfile

      - name: Build chain server bundle
        run: pnpm --filter @workspace/emberchain-node run build

      - name: Prepare desktop resources
        working-directory: lib/emberchain-desktop
        run: npm install && node scripts/prepare-resources.mjs

      - name: Install Tauri CLI globally
        run: npm install -g @tauri-apps/cli@2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: lib/emberchain-desktop
          tauriScript: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "EmberChain Desktop v1.0.0"
          releaseBody: |
            ## EmberChain Desktop v1.0.0

            The all-in-one EmberChain app — full node, wallet, private transactions, and miner in a single desktop install.

            ### Download

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `*-setup.exe` or `*.msi` | Run installer, launch from Start Menu |
            | 🍎 macOS Apple Silicon | `*-aarch64.dmg` | Open DMG → drag to Applications |
            | 🍎 macOS Intel | `*-x64.dmg` | Open DMG → drag to Applications |
            | 🐧 Linux | `*.AppImage` | `chmod +x *.AppImage` then run; or install the `.deb` |

            ### What's included
            - **Wallet** — create or import EMBR wallets, send public and private (shielded) transactions
            - **Node** — full embedded EmberChain node starts automatically, RPC endpoint exposed locally
            - **Miner** — one-click browser mining directly from the app
            - **Private pool** — shield EMBR into private notes, send without revealing sender, receiver, or amount

            > **Android?** Get the EmberChain Mobile Wallet from the [Android release](../../releases).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}
