name: Build Emberchain Wallet

# Trigger: push a tag like  git tag wallet-v1.0.0 && git push --tags
# Or run manually from the Actions tab.
on:
  push:
    tags:
      - 'wallet-v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_glob: 'lib/emberchain-wallet-electron/dist/*.exe'
          - os: macos-latest
            label: macOS
            artifact_glob: 'lib/emberchain-wallet-electron/dist/*.dmg'
          - os: ubuntu-latest
            label: Linux
            artifact_glob: 'lib/emberchain-wallet-electron/dist/*.{AppImage,deb}'

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wallet UI + API server
        run: node lib/emberchain-wallet-electron/scripts/build.mjs
        env:
          BASE_PATH: /
          NODE_ENV: production

      - name: Install Electron app dependencies
        working-directory: lib/emberchain-wallet-electron
        run: npm install

      # macOS code signing (optional — set secrets in repo settings)
      - name: Import macOS certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm -f certificate.p12

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build installers (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallet-${{ matrix.label }}
          path: lib/emberchain-wallet-electron/dist/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Emberchain Wallet ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          generate_release_notes: true
          files: |
            release-files/**/*.exe
            release-files/**/*.dmg
            release-files/**/*.AppImage
            release-files/**/*.deb
          body: |
            ## Emberchain Wallet ${{ github.ref_name }}

            A full Emberchain node + wallet — no MetaMask, no Node.js required.

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `*-Setup-*.exe` | Run installer, then launch from Start Menu |
            | 🍎 macOS Intel | `*-x64.dmg` | Open DMG, drag to Applications |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Open DMG, drag to Applications |
            | 🐧 Linux | `*.AppImage` | `chmod +x` then run; or install `.deb` |

            ### First launch
            The app downloads the current chain state (~a few MB) on first run, then opens your wallet.
            Chain data is stored in your OS user-data folder and persists across updates.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
