name: Build Emberchain Wallet

on:
  push:
    tags:
      - 'wallet-v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'true'

jobs:
  # ── Step 1: build the wallet UI + API server bundle once on Linux ──────────
  build-assets:
    name: Build wallet UI + server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build wallet UI + API server
        run: node lib/emberchain-wallet-electron/scripts/build.mjs
        env:
          BASE_PATH: /
          NODE_ENV: production

      - name: Upload built resources
        uses: actions/upload-artifact@v4
        with:
          name: electron-resources
          path: lib/emberchain-wallet-electron/_resources/
          if-no-files-found: error

  # ── Step 2: package for each platform using the pre-built assets ───────────
  build:
    name: Package — ${{ matrix.label }}
    needs: build-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download pre-built resources
        uses: actions/download-artifact@v4
        with:
          name: electron-resources
          path: lib/emberchain-wallet-electron/_resources/

      - name: Install Electron app dependencies
        working-directory: lib/emberchain-wallet-electron
        run: npm install

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npx electron-builder --win --publish never

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npx electron-builder --mac --publish never

      - name: Build installers (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: lib/emberchain-wallet-electron
        run: npx electron-builder --linux --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: lib/emberchain-wallet-electron/dist/
          if-no-files-found: error

  # ── Step 3: attach everything to a GitHub Release (tag builds only) ────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Emberchain Wallet ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          generate_release_notes: true
          files: |
            release-files/**/*.exe
            release-files/**/*.dmg
            release-files/**/*.AppImage
          body: |
            ## Emberchain Wallet ${{ github.ref_name }}

            Full Emberchain node + wallet — no MetaMask, no Node.js required.

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `*-Setup.exe` | Run installer, launch from Start Menu |
            | 🍎 macOS Intel | `*-x64.dmg` | Open DMG, drag to Applications |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Open DMG, drag to Applications |
            | 🐧 Linux | `*.AppImage` | `chmod +x` then run |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
