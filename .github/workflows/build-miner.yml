name: Build Emberchain Miner

on:
  push:
    tags:
      - 'miner-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach installers to (e.g. miner-v1.0.0)'
        required: true
        default: 'miner-v1.0.0'
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'false'

jobs:
  # ── Package for each platform ──────────────────────────────────────────────
  build:
    name: Package — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron app dependencies
        working-directory: lib/emberchain-miner-electron
        run: npm install

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: lib/emberchain-miner-electron
        run: npx electron-builder --win --publish never

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: lib/emberchain-miner-electron
        run: npx electron-builder --mac --publish never

      - name: Build installers (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: lib/emberchain-miner-electron
        run: npx electron-builder --linux --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: lib/emberchain-miner-electron/dist/
          if-no-files-found: error

  # ── Attach everything to a GitHub Release ─────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: tag
        run: echo "name=${{ inputs.tag_name || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Emberchain Miner ${{ steps.tag.outputs.name }}
          draft: ${{ inputs.draft != 'false' && !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: false
          files: |
            release-files/**/*.exe
            release-files/**/*.dmg
            release-files/**/*.AppImage
          body: |
            ## Emberchain Miner ${{ steps.tag.outputs.name }}

            Native desktop miner for the Emberchain network. Click Start Mining — UPnP, hashrate, shares, and block rewards update live.

            | Platform | Download | Notes |
            |----------|----------|-------|
            | 🪟 Windows | `*-Setup.exe` | Run installer, launch from Start Menu |
            | 🍎 macOS Intel | `*-x64.dmg` | Open DMG, drag to Applications |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Open DMG, drag to Applications |
            | 🐧 Linux | `*.AppImage` | `chmod +x *.AppImage` then run |

            **Quick start:** Paste your Emberchain wallet address, adjust the intensity slider, hit **START MINING**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
