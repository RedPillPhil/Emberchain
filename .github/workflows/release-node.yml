name: Build & Release Node Executables

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. node-v1.3.0)"
        required: true
        default: "node-v1.3.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            binary: emberchain-node-linux
          - os: windows-2022
            platform: win
            binary: emberchain-node-win.exe
          - os: macos-14
            platform: macos
            binary: emberchain-node-macos-arm64
          - os: macos-13
            platform: macos
            binary: emberchain-node-macos-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SEA executable (Linux / macOS)
        if: matrix.platform != 'win'
        shell: bash
        working-directory: lib/emberchain-node/dist/downloads
        run: |
          echo '{"main":"emberchain-standalone.js","output":"sea-prep.blob","disableExperimentalSEAWarning":true}' > sea-config.json
          node --experimental-sea-config sea-config.json

          cp "$(which node)" "${{ matrix.binary }}"
          chmod +x "${{ matrix.binary }}"

          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            codesign --remove-signature "${{ matrix.binary }}" || true
          fi

          npx --yes postject "${{ matrix.binary }}" NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            codesign --sign - "${{ matrix.binary }}" || true
          fi

      - name: Build SEA executable (Windows)
        if: matrix.platform == 'win'
        shell: powershell
        working-directory: lib/emberchain-node/dist/downloads
        run: |
          # Write JSON without BOM (Out-File utf8 adds BOM which breaks node)
          [System.IO.File]::WriteAllText(
            "$PWD\sea-config.json",
            '{"main":"emberchain-standalone.js","output":"sea-prep.blob","disableExperimentalSEAWarning":true}'
          )
          node --experimental-sea-config sea-config.json
          Copy-Item (Get-Command node).Source "${{ matrix.binary }}"
          npx --yes postject "${{ matrix.binary }}" NODE_SEA_BLOB sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: lib/emberchain-node/dist/downloads/${{ matrix.binary }}
          fail_on_unmatched_files: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
