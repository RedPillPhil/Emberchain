kind = "mobile"
previewPath = "/mobile-wallet/"
title = "EmberChain Mobile Wallet"
version = "1.0.0"
id = "artifacts/mobile-wallet"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile-wallet/" ]
localPort = 18705

[services.development]
run = "pnpm --filter @workspace/mobile-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-wallet", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile-wallet", "run", "serve" ]

[services.env]
PORT = "18705"
BASE_PATH = "/mobile-wallet/"
